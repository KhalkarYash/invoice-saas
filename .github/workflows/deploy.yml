name: Deploy

# Trigger manually or on PR merge into main
on:
  workflow_dispatch:
  pull_request:
    types: [closed]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-services:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            lambda: invoiceAuthFunction
          - service: user-service
            lambda: invoiceUserFunction
          - service: invoice-service
            lambda: invoiceInvoiceFunction
          - service: payment-service
            lambda: invoicePaymentFunction
          - service: notification-service
            lambda: invoiceNotificationFunction

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js with pnpm caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 3. Setup pnpm properly
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # 4. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Build service + dependencies using Turborepo
      - name: Build service and dependencies
        run: pnpm turbo run build --filter=${{ matrix.service }}^...

      # 6. Package Lambda (contents of dist only)
      - name: Package Lambda
        run: |
          cd apps/${{ matrix.service }}/dist
          zip -r ../../../${{ matrix.service }}.zip .

      # 7. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 8. Upload zip to S3
      - name: Upload Lambda zip to S3
        run: |
          aws s3 cp ${{ matrix.service }}.zip s3://invoice-saas-s3/services/${{ matrix.service }}.zip --region ${{ secrets.AWS_REGION }}

      # 9. Update Lambda function
      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ matrix.lambda }} \
            --s3-bucket invoice-saas-s3 \
            --s3-key services/${{ matrix.service }}.zip \
            --region ${{ secrets.AWS_REGION }}

      # 10. Cleanup local zip
      - name: Cleanup
        run: rm -f ${{ matrix.service }}.zip

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-services
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js with pnpm caching
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm --filter web build

      - name: Deploy Web to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          pnpm dlx vercel build --prod --token="$VERCEL_TOKEN"
          pnpm dlx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
